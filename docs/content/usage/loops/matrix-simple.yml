name: Matrix Loop (Multi-Iterator)

vars:
  platforms:
    - linux
    - darwin
  architectures:
    - amd64
    - arm64

tasks:
  default:
    desc: Cross-compile for all platform/arch combinations
    steps:
      - for:
          - platform in platforms
          - arch in architectures
        run: echo "Building for ${{ platform }}/${{ arch }}..."
